groups:
  - name: qadash-alerts
    interval: 30s
    rules:
      # API Alerts
      - alert: APIHighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on API"
          description: "API error rate is {{ $value | humanizePercentage }} (expected <5%)"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "API p95 latency is {{ $value }}s (expected <5s)"

      - alert: APIResponsesSlow
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "API responses are very slow"
          description: "API p99 latency is {{ $value }}s (expected <10s)"

      # Queue Alerts
      - alert: QueueHighFailureRate
        expr: sum(rate(queue_jobs_failed_total[5m])) / sum(rate(queue_jobs_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue job failure rate"
          description: "Queue failure rate is {{ $value | humanizePercentage }} (expected <10%)"

      - alert: QueueBacklog
        expr: sum(queue_jobs_in_progress) > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog building up"
          description: "{{ $value }} jobs are queued and waiting"

      # Execution Alerts
      - alert: ExecutionSuccessRateLow
        expr: sum(test_executions_by_status{status="passed"}) / sum(test_executions_total) < 0.8
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Low test execution success rate"
          description: "Success rate is {{ $value | humanizePercentage }} (expected >80%)"

      - alert: ExecutionFlaky
        expr: sum(test_execution_retries_total) / sum(test_executions_total) > 0.15
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "High test flakiness detected"
          description: "Retry rate is {{ $value | humanizePercentage }} (expected <15%)"

      # AI Alerts
      - alert: AIRequestHighFailureRate
        expr: sum(ai_requests_failed_total) / sum(ai_requests_total) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High AI request failure rate"
          description: "AI failure rate is {{ $value | humanizePercentage }} (expected <10%)"

      - alert: AICostSpike
        expr: sum(ai_tokens_used_total) > 100000
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "AI cost spike detected"
          description: "Token usage has spiked to {{ $value }} tokens in the last hour"

      # Infrastructure Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% (expected <80%)"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% (expected <85%)"

      - alert: DiskSpaceLow
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} > 0.9
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is {{ $value | humanizePercentage }} (expected <90%)"

      - alert: DatabaseHighLatency
        expr: histogram_quantile(0.95, sum(rate(database_query_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Database query latency high"
          description: "Database p95 latency is {{ $value }}s (expected <1s)"

      # Worker Alerts
      - alert: WorkerHighFailureRate
        expr: sum(rate(worker_jobs_failed_total[5m])) by (worker_id) / sum(rate(worker_jobs_completed_total[5m])) by (worker_id) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.worker_id }} has high failure rate"
          description: "Worker failure rate is {{ $value | humanizePercentage }} (expected <10%)"

      - alert: WorkerOffline
        expr: up{job="qadash-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker is offline"
          description: "Worker {{ $labels.instance }} has been offline for 2 minutes"

      # Application Alerts
      - alert: ApplicationDown
        expr: up{job="qadash-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application is down"
          description: "QADash API has been down for 1 minute"