global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'qadash'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'qadash-api'
    metrics_path: '/monitoring/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:3001']
        labels:
          service: 'api'
          environment: 'production'

  - job_name: 'qadash-worker'
    metrics_path: '/monitoring/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:3002']
        labels:
          service: 'worker'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['localhost:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['localhost:9121']

  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']

remote_write:
  - url: https://prometheus-blend-1.grafana.net/api/v1/push
    basic_auth:
      password: 'YOUR_PROMETHEUS_REMOTE_WRITE_PASSWORD'