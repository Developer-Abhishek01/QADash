input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ "^{" {
    json {
      source => "message"
    }
  }

  # Add timestamp
  mutate {
    add_field => { "timestamp" => "%{+yyyy-MM-dd HH:mm:ss}" }
  }

  # Filter out health checks
  if [request] == "/health" or [request] == "/api/health" {
    drop { }
  }

  # Add app name
  if [container_name] =~ "frontend" {
    mutate { add_field => { "app" => "frontend" } }
  } else if [container_name] =~ "backend" {
    mutate { add_field => { "app" => "backend" } }
  } else if [container_name] =~ "ai-engine" {
    mutate { add_field => { "app" => "ai-engine" } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "qadash-logs-%{+YYYY.MM.dd}"
  }
}