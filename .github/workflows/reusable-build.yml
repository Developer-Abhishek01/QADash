name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '20'
      build_target:
        type: string
        default: 'all'
      cache_version:
        type: string
        default: 'v1'

env:
  NODE_VERSION: ${{ inputs.node_version }}
  CACHE_VERSION: ${{ inputs.cache_version }}

jobs:
  build:
    name: Build ${{ inputs.build_target }}
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.outputs.outputs.backend_image }}
      frontend_image: ${{ steps.outputs.outputs.frontend_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: |
          case "${{ inputs.build_target }}" in
            backend)
              npm run -w @qadash/backend prisma generate
              npm run -w @qadash/backend build
              echo "backend_image=${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT
              ;;
            frontend)
              npm run -w @qadash/frontend build
              echo "frontend_image=${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT
              ;;
            all)
              npm run -w @qadash/backend prisma generate
              npm run -w @qadash/backend build
              npm run -w @qadash/frontend build
              echo "backend_image=${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT
              echo "frontend_image=${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.build_target }}
          path: |
            apps/backend/dist/
            apps/frontend/.next/
          retention-days: 1