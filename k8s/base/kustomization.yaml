apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qadash

resources:
- namespace.yaml
- backend-deployment.yaml
- frontend-deployment.yaml
- worker-deployment.yaml
- autoscaling.yaml
- ingress.yaml
- secrets.yaml
- configmap.yaml
- monitoring.yaml
- network-policy.yaml
- storage.yaml

configMapGenerator:
- name: qadash-config
  envs:
  - config.env

vars:
- name: RELEASE_NAME
  objref:
    kind: ReplicationController
    name: qadash
    apiVersion: v1

configurations:
- kustomize-config.yaml