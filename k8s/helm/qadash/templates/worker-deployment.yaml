apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qadash.fullname" . }}-worker
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
    app: worker
    component: executor
spec:
  replicas: {{ .Values.worker.replicas }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "qadash.selectorLabels" . | nindent 6 }}
      app: worker
  template:
    metadata:
      labels:
        {{- include "qadash.selectorLabels" . | nindent 8 }}
        app: worker
        component: executor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: workload-type
                operator: In
                values:
                - worker
      initContainers:
      - name: check-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ .Release.Name }}-postgresql {{ .Values.database.postgresql.primary.service.port }}; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database is ready!"
      - name: check-redis
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ .Release.Name }}-redis-master {{ .Values.cache.redis.service.port }}; do
            echo "Waiting for Redis..."
            sleep 2
          done
          echo "Redis is ready!"
      containers:
      - name: worker
        image: "{{ .Values.global.image.registry }}/{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        env:
        - name: NODE_ENV
          value: "production"
        - name: WORKER_CONCURRENCY
          value: "{{ .Values.worker.env.WORKER_CONCURRENCY }}"
        - name: WORKER_TIMEOUT
          value: "{{ .Values.worker.env.WORKER_TIMEOUT }}"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: qadash-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: qadash-secrets
              key: redis-url
        envFrom:
        - configMapRef:
            name: {{ include "qadash.fullname" . }}-config
        resources:
          {{- toYaml .Values.global.resources.worker | nindent 10 }}
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: reports
          mountPath: /app/reports
        - name: tmp
          mountPath: /tmp
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.uploads.enabled | ternary (printf "%s-uploads" (include "qadash.fullname" .)) "" }}
      - name: reports
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.reports.enabled | ternary (printf "%s-reports" (include "qadash.fullname" .)) "" }}
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: workspace
        emptyDir:
          sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qadash.fullname" . }}-worker
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
    app: worker
spec:
  clusterIP: None
  ports:
  - port: 9090
    targetPort: 9090
    name: metrics
  selector:
    {{- include "qadash.selectorLabels" . | nindent 4 }}
    app: worker