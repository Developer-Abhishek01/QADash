apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qadash.fullname" . }}-backend
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
    app: backend
    component: api
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 5
  strategy:
    type: {{ .Values.rollout.strategy }}
    rollingUpdate:
      maxSurge: {{ .Values.rollout.maxSurge }}
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "qadash.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "qadash.selectorLabels" . | nindent 8 }}
        app: backend
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/monitoring/metrics"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: backend
        image: "{{ .Values.global.image.registry }}/{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.port }}
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        {{- range .Values.backend.env }}
        - name: {{ .name }}
          {{- if .value }}
          value: {{ .value | quote }}
          {{- else if .valueFrom }}
          valueFrom:
            {{- toYaml .valueFrom | nindent 12 }}
          {{- end }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "qadash.fullname" . }}-config
        resources:
          {{- toYaml .Values.global.resources.backend | nindent 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.backend.healthCheck.path }}
            port: {{ .Values.backend.healthCheck.port }}
          initialDelaySeconds: {{ .Values.backend.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.healthCheck.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.healthCheck.timeoutSeconds }}
          failureThreshold: {{ .Values.backend.healthCheck.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.backend.readinessProbe.path }}
            port: {{ .Values.backend.readinessProbe.port }}
          initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold }}
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: reports
          mountPath: /app/reports
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.uploads.enabled | ternary (printf "%s-uploads" (include "qadash.fullname" .)) "" }}
      - name: reports
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.reports.enabled | ternary (printf "%s-reports" (include "qadash.fullname" .)) "" }}
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qadash.fullname" . }}-backend
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
    app: backend
    component: api
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.backend.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "qadash.selectorLabels" . | nindent 4 }}
    app: backend