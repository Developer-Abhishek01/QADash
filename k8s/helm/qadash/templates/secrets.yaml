apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-secrets
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: postgres://postgres:password@{{ .Release.Name }}-postgresql:5432/qadash
  redis-url: redis://:{{ .Release.Name }}-redis-master:6379/0
  jwt-secret: {{ randAlphaNum 32 }}
  jwt-refresh-secret: {{ randAlphaNum 32 }}
  encryption-key: {{ randAlphaNum 32 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-smtp
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: Opaque
stringData:
  smtp-host: smtp.gmail.com
  smtp-port: "587"
  smtp-user: notifications@qadash.io
  smtp-password: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-external-services
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: Opaque
stringData:
  aws-access-key-id: ""
  aws-secret-access-key: ""
  aws-region: us-east-1
  s3-bucket: qadash-uploads
  openai-api-key: ""
  anthropic-api-key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-slack
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: Opaque
stringData:
  slack-webhook-url: ""
  slack-channel: "#qadash-alerts"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-database
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: kubernetes.io/postgres-password
data:
  postgres-password: {{ randAlphaNum 16 | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qadash.fullname" . }}-redis
  labels:
    {{- include "qadash.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ randAlphaNum 16 | b64enc }}