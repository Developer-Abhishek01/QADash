# Production Overlay - Blue/Green Deployment with Canary
# Version: 1.0.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: qadash-config
  namespace: qadash
data:
  NODE_ENV: "production"
  LOG_LEVEL: "warn"
  API_URL: "http://backend:3001"
  AI_ENGINE_URL: "http://ai-engine:3002"
  WS_URL: "ws://backend:3001"
  RATE_LIMIT: "1000"
  CACHE_TTL: "3600"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: qadash
  annotations:
    kubernetes.io/change-cause: "Backend production deployment"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: stable
    spec:
      serviceAccountName: qadash-backend
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/qadash/backend:v1.0.0
          ports:
            - containerPort: 3001
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: qadash-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: qadash-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: qadash-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qadash-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend

---
# Blue/Green Services
apiVersion: v1
kind: Service
metadata:
  name: backend-blue
  namespace: qadash
spec:
  type: ClusterIP
  selector:
    app: backend
    version: stable
  ports:
    - name: http
      port: 3001
      targetPort: 3001

---
apiVersion: v1
kind: Service
metadata:
  name: backend-green
  namespace: qadash
spec:
  type: ClusterIP
  selector:
    app: backend
    version: canary
  ports:
    - name: http
      port: 3001
      targetPort: 3001

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: qadash
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: backend

---
# Service Monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: qadash
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: 3001
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - qadash

---
# Alert Rules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  namespace: qadash
spec:
  groups:
    - name: qadash-backend
      rules:
        - alert: BackendHighCPU
          expr: avg(rate(container_cpu_usage_seconds_total{pod=~"backend-.*"}[5m])) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on backend"
        - alert: BackendHighMemory
          expr: avg(rate(container_memory_usage_bytes{pod=~"backend-.*"}[5m])) > 1073741824
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on backend"
        - alert: BackendDown
          expr: up{job="backend"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Backend is down"
        - alert: HighErrorRate
          expr: sum(rate(http_requests_total{status=~"5..", pod=~"backend-.*"}[5m])) / sum(rate(http_requests_total{pod=~"backend-.*"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on backend"

---
# Horizontal Pod Autoscaler - Production Tuned
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: qadash
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 5
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min